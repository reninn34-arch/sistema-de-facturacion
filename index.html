<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          console.log('✅ ServiceWorker registrado exitosamente:', reg.scope);
        }).catch(function(err) {
          console.log('⚠️ Error al registrar ServiceWorker:', err);
        });
      });
    }
  </script>
</body>
